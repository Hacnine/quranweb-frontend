<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Sky background -->
  <rect width="320" height="180" fill="#0f1117"/>

  <!-- Stars -->
  <circle cx="40" cy="20" r="1" fill="#aab" opacity="0.6"/>
  <circle cx="80" cy="10" r="1.2" fill="#aab" opacity="0.5"/>
  <circle cx="130" cy="15" r="0.8" fill="#aab" opacity="0.7"/>
  <circle cx="200" cy="8" r="1" fill="#aab" opacity="0.5"/>
  <circle cx="250" cy="20" r="1.3" fill="#aab" opacity="0.6"/>
  <circle cx="290" cy="12" r="0.9" fill="#aab" opacity="0.4"/>

  <!-- Crescent moon -->
  <circle cx="270" cy="30" r="14" fill="#2a2a3a"/>
  <circle cx="277" cy="24" r="11" fill="#0f1117"/>

  <!-- Left tall minaret -->
  <rect x="42" y="35" width="14" height="110" fill="#1e2535"/>
  <path d="M42 35 Q49 20 56 35Z" fill="#1e2535"/>
  <circle cx="49" cy="22" r="3" fill="#3a4a35"/>
  <!-- Left minaret windows -->
  <rect x="45" y="60" width="8" height="12" rx="4" fill="#0f1117" opacity="0.6"/>
  <rect x="45" y="85" width="8" height="12" rx="4" fill="#0f1117" opacity="0.6"/>

  <!-- Right tall minaret -->
  <rect x="264" y="35" width="14" height="110" fill="#1e2535"/>
  <path d="M264 35 Q271 20 278 35Z" fill="#1e2535"/>
  <circle cx="271" cy="22" r="3" fill="#3a4a35"/>
  <!-- Right minaret windows -->
  <rect x="267" y="60" width="8" height="12" rx="4" fill="#0f1117" opacity="0.6"/>
  <rect x="267" y="85" width="8" height="12" rx="4" fill="#0f1117" opacity="0.6"/>

  <!-- Left small minaret -->
  <rect x="88" y="65" width="10" height="80" fill="#1e2535"/>
  <path d="M88 65 Q93 54 98 65Z" fill="#1e2535"/>

  <!-- Right small minaret -->
  <rect x="222" y="65" width="10" height="80" fill="#1e2535"/>
  <path d="M222 65 Q227 54 232 65Z" fill="#1e2535"/>

  <!-- Side wing left -->
  <rect x="98" y="90" width="55" height="55" fill="#1a2030"/>
  <path d="M98 90 Q125 72 153 90Z" fill="#1a2030"/>

  <!-- Side wing right -->
  <rect x="167" y="90" width="55" height="55" fill="#1a2030"/>
  <path d="M167 90 Q195 72 222 90Z" fill="#1a2030"/>

  <!-- Main building body -->
  <rect x="100" y="80" width="120" height="65" fill="#1e2535"/>

  <!-- Main dome -->
  <path d="M120 80 Q160 42 200 80Z" fill="#243040"/>
  <ellipse cx="160" cy="80" rx="40" ry="8" fill="#1e2535"/>

  <!-- Smaller side domes -->
  <path d="M98 90 Q125 75 153 90Z" fill="#1a2030"/>
  <path d="M167 90 Q195 75 222 90Z" fill="#1a2030"/>

  <!-- Central door arch -->
  <path d="M148 145 Q160 125 172 145L172 145L148 145Z" fill="#0f1117" opacity="0.8"/>

  <!-- Windows on main building -->
  <path d="M110 100 Q118 90 126 100L126 115L110 115Z" fill="#0f1117" opacity="0.5"/>
  <path d="M138 100 Q146 90 154 100L154 115L138 115Z" fill="#0f1117" opacity="0.5"/>
  <path d="M166 100 Q174 90 182 100L182 115L166 115Z" fill="#0f1117" opacity="0.5"/>
  <path d="M194 100 Q202 90 210 100L210 115L194 115Z" fill="#0f1117" opacity="0.5"/>

  <!-- Ground -->
  <rect x="0" y="145" width="320" height="35" fill="#131318"/>

  <!-- Ground steps -->
  <rect x="90" y="140" width="140" height="6" rx="1" fill="#1a1f2e"/>
  <rect x="110" y="136" width="100" height="5" rx="1" fill="#1a1f2e"/>
</svg>
